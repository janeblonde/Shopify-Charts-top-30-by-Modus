name: Update Weekly Chart

on:
  schedule:
    - cron: '0 0 * * 4'   # Thu 00:00 UTC -- Wednesday midnight GMT
    - cron: '0 23 * * 3'  # Wed 23:00 UTC -- Wednesday midnight BST
  workflow_dispatch:

jobs:
  update-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run chart update script
        env:
          SHOPIFY_SHOP:  ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:   ${{ github.repository }}
        run: python scripts/update_chart.py